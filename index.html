<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SBRT Sorting Ceremony</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f4f4f9;
            --gryffindor: #ae0001; --hufflepuff: #ecb939;
            --ravenclaw: #222f5e; --slytherin: #2a623d;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #quiz-container {
            max-width: 500px;
            width: 90%;
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 1px solid #eee;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 8px;
            font-size: 1rem;
        }
        .option-btn:hover {
            border-color: var(--accent);
            background: #fff8f8;
            transform: translateY(-1px);
        }
	/* Result Styles */
        #house-img {
            width: 120px;
            height: 120px;
            margin: 20px auto;
            display: block;
            object-fit: contain;
        }
        #house-description {
            font-style: italic;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .hidden { display: none; }
        #progress-bar { height: 5px; background: #740001; width: 0%; transition: 0.3s; margin-bottom: 20px; }
        canvas { margin-top: 20px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="start-step">
        <h1>Find out which house of SBRT you belong to!</h1>
        <button class="option-btn" onclick="startQuiz()">Begin the sorting ceremony</button>
    </div>

    <div id="quiz-step" class="hidden">
        <div id="progress-bar"></div>
        <h2 id="question-text"></h2>
        <div id="options-container"></div>
    </div>

    <div id="result-step" class="hidden">
        <h2>The Sorting Hat has spoken!</h2>
	<img id="house-img" src="" alt="House Crest">
        <h1 id="house-result"></h1>
        <p id="house-description"></p>
        <canvas id="scoreChart"></canvas>
        <button class="option-btn" onclick="location.reload()">Try Again</button>
    </div>
</div>

<script>
    // 1. Data Definitions
    const houseData = {
        Gryffindor: {
            desc: "You are the early adopter. You aren't just fast; you are genuinely excited by innovation. You embrace new platforms like the Ethos and AI-contouring with bravery and enthusiasm, leading the charge into the future of adaptive RT",
            img: "Filled-Gryffindor.svg" // Replace with your image URLs
        },
        Hufflepuff: {
            desc: "You are the bedrock of the clinic. You understand that SBRT is a team sport and that Safety is the ultimate innovation. You prioritize reproducible workflows and patient comfort, ensuring that the High Tech treatment actually works for real patients",
            img: "Filled-Hufflepuff.svg"
        },
        Ravenclaw: {
            desc: "You are the MRI-linac scholar and guardian of the Ground Truth. You value the absolute clarity of soft-tissue contrast and the rigorous quantification of uncertainty.",
            img: "Filled-Ravenclaw.svg"
        },
        Slytherin: {
            desc: "You know exactly who you are. You are the 'Cunning' problem solver who navigates the gray areas of clinical constraints to find a win. If there is a way to make a difficult case work, you will find it, by any means necessary",
            img: "Filled-Slytherin.svg"
        }
    };
    const questions = [
        {
            q: "What is your favorite 'magical' tool in the clinic?",
            options: [
                { text: "The 'Undo' button on the TPS.", house: "Hufflepuff" },
                { text: "High-dose-rate 6MV FFF beams. For speed. ", house: "Gryffindor" },
                { text: "A Deformable Image Registration (DIR) algorithm and quality AI contouring", house: "Slytherin" },
                { text: "Real-time cine-MRI gating", house: "Ravenclaw" }
            ]
        },
        {
            q: "A patient arrives with a pacemaker and a request for liver SBRT. You...",
            options: [
                { text: "Double-check the clinic’s standard SOP for the third time", house: "Hufflepuff" },
                { text: "Treat them on the Ethos with bold confidence", house: "Gryffindor" },
                { text: "Enjoy the challenge of navigating artifacts and constraints", house: "Slytherin" },
                { text: "Send them a polite 'Referral Denied' letter", house: "Ravenclaw" }
            ]
        },
        {
            q: "What is the Dark Arts of SBRT",
            options: [
                { text: "Patient 'jiggling' on the couch", house: "Hufflepuff" },
                { text: "Metal artifacts", house: "Slytherin" },
                { text: "Bowel gas", house: "Gryffindor" },
                { text: "Delineation uncertainties", house: "Ravenclaw" }
            ]
        },
        {
            q: "In an MDT meeting, you are the one who says",
            options: [
                { text: "Technically, we could make this work if we...", house: "Slytherin" },
                { text: "What does the latest meta-analysis say?", house: "Ravenclaw" },
                { text: "Let's just get it done. The anatomy is clear enough!", house: "Gryffindor" },
                { text: "Is the patient comfortable with this?", house: "Hufflepuff" }
            ]
        },
        {
            q: "How do you feel about intrafractional motion",
            options: [
                { text: "It’s a variable I can manage with the right tools", house: "Slytherin" },
                { text: "It's why I have high blood pressure?", house: "Hufflepuff" },
                { text: "It's an uncertainty that must be measured in cine-MRI and after imaging", house: "Ravenclaw" },
                { text: "If I'm fast enough at adapting, it can't catch me", house: "Gryffindor" }
            ]
        },
        {
            q: "Your ideal clinical environment is...",
            options: [
                { text: "A quiet room with four monitors and perfect soft-tissue contrast", house: "Ravenclaw" },
                { text: "The cutting edge, making decisions on the fly", house: "Gryffindor" },
                { text: "A busy, friendly department where everyone collaborates", house: "Hufflepuff" },
                { text: "A high-stakes department, where we can treat even the impossible cases", house: "Slytherin" }
            ]
        },
        {
            q: "Your Book of Spells is mostly full of",
            options: [
                { text: "Shortcuts for fast online contouring", house: "Gryffindor" },
                { text: "Peer-reviewed studies to ensure our decisions are evidence-based", house: "Ravenclaw" },
                { text: "Checklists and patient comfort tips", house: "Hufflepuff" },
                { text: "Custom scripts to bypass software limitations", house: "Slytherin" }
            ]
        },
        {
            q: "What does 'Innovation' mean to you in a clinical setting?",
            options: [
                { text: "Improving the patient experience and making sure no one is left behind", house: "Hufflepuff" },
                { text: "Implementing a new workflow that pushes the boundaries of the machine", house: "Gryffindor" },
                { text: "Publishing the most precise, uncertainty-quantified data in the field", house: "Ravenclaw" },
                { text: "Solving the cases that everyone else says are 'untreatable.'", house: "Slytherin" }
            ]
        },
        {
            q: "How do you handle a plan revision during a treatment course?",
            options: [
                { text: "I analyze the cumulative dose to see if a revision is actually necessary", house: "Ravenclaw" },
                { text: "I use it as an opportunity to get even better OAR sparing", house: "Slytherin" },
                { text: "What plan revision? Haven't you heard about online adaptive radiotherapy???", house: "Gryffindor" },
                { text: "I do it diligently to ensure the team feels confident for the remaining fractions", house: "Hufflepuff" }
	   ]
	},
        {
            q: "It’s a Friday afternoon, the schedule is delayed, and the team is tired. You are the one who...",
            options: [
                { text: "Identifies the bottleneck in the workflow and suggests a systemic change so this doesn't happen next Friday", house: "Ravenclaw" },
                { text: "Brings in treats and makes sure everyone has had a break, even if it means you stay late", house: "Hufflepuff" },
                { text: "Keeps the energy high, rallies the troops, and pushes to finish the last patient with a smile", house: "Gryffindor" },
                { text: "Finds a clever way to re-sequence the tasks so we get out of here 20 minutes earlier", house: "Slytherin" }
            ]
        }

    ];


// 2. State Management
    let currentStep = 0;
    let scores = { Gryffindor: 0, Hufflepuff: 0, Ravenclaw: 0, Slytherin: 0 };

    // 3. Logic Functions
    function updateProgress() {
        const percentage = (currentStep / questions.length) * 100;
        document.getElementById('progress-bar').style.width = percentage + "%";
    }

function startQuiz() {
    document.getElementById('start-step').classList.add('hidden');
    document.getElementById('quiz-step').classList.remove('hidden');
    showQuestion();
}

    function showQuestion() {
        const q = questions[currentStep];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress-bar').style.width = (currentStep / questions.length) * 100 + "%";
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => { scores[opt.house]++; nextStep(); };
            container.appendChild(btn);
        });
    }

    function nextStep() {
        currentStep++;
        if (currentStep < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        updateProgress(); // Fill it to 100%
        document.getElementById('quiz-step').classList.add('hidden');
        document.getElementById('result-step').classList.remove('hidden');
        
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        
        document.getElementById('house-result').innerText = winner;
        document.getElementById('house-description').innerText = houseData[winner].desc;
        document.getElementById('house-img').src = houseData[winner].img;

	// Render the Pie Chart
        const ctx = document.getElementById('scoreChart').getContext('2d');
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Gryffindor', 'Hufflepuff', 'Ravenclaw', 'Slytherin'],
                datasets: [{
                    data: [scores.Gryffindor, scores.Hufflepuff, scores.Ravenclaw, scores.Slytherin],
                    backgroundColor: ['#ae0001', '#ecb939', '#222f5e', '#2a623d']
                }]
            },
            options: { responsive: true }
        });
    }

    // Start
    showQuestion();
</script>

</body>
</html>
